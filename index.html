<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Qius Food Service — Digital Menu + ERP para restaurantes</title>
  <meta name="description" content="Conecte o pedido digital do cliente à operação do seu restaurante. Cardápio digital + ERP em uma plataforma. Menos erro, mais controle."/>
  <link rel="icon" href="assets/favicon.ico"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lenis@1.1.14/dist/lenis.min.js" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="header.jsx"></script>
  <script type="text/babel" src="hero.jsx"></script>
  <script type="text/babel" src="problem-solution.jsx"></script>
  <script type="text/babel" src="how-it-works.jsx"></script>
  <script type="text/babel" src="modules.jsx"></script>
  <script type="text/babel" src="sections.jsx"></script>
  <script type="text/babel" src="tweaks.jsx"></script>

  <script type="text/babel">
    const App = () => {
      React.useEffect(() => {
        gsap.registerPlugin(ScrollTrigger);

        // — Lenis smooth scroll —
        const lenis = new Lenis({ lerp: 0.1, wheelMultiplier: 0.85, smoothTouch: false });
        lenis.on('scroll', () => ScrollTrigger.update());
        const lenisRaf = (time) => lenis.raf(time * 1000);
        gsap.ticker.add(lenisRaf);
        gsap.ticker.lagSmoothing(0);

        // Smooth anchor links
        document.querySelectorAll('a[href^="#"]').forEach(a => {
          const href = a.getAttribute('href');
          if (!href || href === '#') return;
          a.addEventListener('click', e => {
            const target = document.querySelector(href);
            if (!target) return;
            e.preventDefault();
            lenis.scrollTo(target, { offset: -72, duration: 1.2 });
          });
        });

        // Mark as handled so the generic loop skips them
        const arm = (sel) => document.querySelectorAll(sel).forEach(el => el.classList.add('in'));

        // — Hero entrance (on load, staggered) —
        const heroText = document.querySelector('.hero .reveal.in');
        if (heroText) {
          gsap.from([...heroText.children], {
            y: 22, opacity: 0, duration: 0.8, stagger: 0.1, ease: 'power3.out', delay: 0.1,
          });
        }
        gsap.from('.hero-visual', {
          y: 30, opacity: 0, scale: 0.96, duration: 1, ease: 'power3.out', delay: 0.25,
          clearProps: 'transform',
        });

        // — Problem/solution: slide from sides —
        gsap.fromTo('.ps-card.before',
          { x: -52, opacity: 0 },
          { scrollTrigger: { trigger: '.ps-grid', start: 'top 80%', once: true }, x: 0, opacity: 1, duration: 0.75, ease: 'power3.out' }
        );
        gsap.fromTo('.ps-card.after',
          { x: 52, opacity: 0 },
          { scrollTrigger: { trigger: '.ps-grid', start: 'top 80%', once: true }, x: 0, opacity: 1, duration: 0.75, ease: 'power3.out', delay: 0.1 }
        );
        arm('.ps-card');

        // — Steps: staggered fade-up —
        gsap.fromTo('.step',
          { y: 48, opacity: 0 },
          { scrollTrigger: { trigger: '.steps', start: 'top 80%', once: true }, y: 0, opacity: 1, duration: 0.7, stagger: 0.15, ease: 'power3.out' }
        );
        arm('.step');

        // — Benefits: staggered —
        gsap.fromTo('.benefit',
          { y: 36, opacity: 0 },
          { scrollTrigger: { trigger: '.benefits-grid', start: 'top 80%', once: true }, y: 0, opacity: 1, duration: 0.65, stagger: 0.07, ease: 'power3.out' }
        );
        arm('.benefit');

        // — Trust cards: staggered —
        gsap.fromTo('.trust-card',
          { y: 32, opacity: 0 },
          { scrollTrigger: { trigger: '.trust-cards', start: 'top 80%', once: true }, y: 0, opacity: 1, duration: 0.65, stagger: 0.1, ease: 'power3.out' }
        );
        arm('.trust-card');

        // — CTA final: scale + fade —
        gsap.fromTo('.cta-final',
          { y: 40, opacity: 0, scale: 0.98 },
          { scrollTrigger: { trigger: '.cta-final', start: 'top 82%', once: true }, y: 0, opacity: 1, scale: 1, duration: 0.8, ease: 'power3.out' }
        );
        arm('.cta-final');

        // — Everything else with .reveal not yet handled —
        document.querySelectorAll('.reveal:not(.in)').forEach(el => {
          el.classList.add('in');
          gsap.fromTo(el,
            { y: 28, opacity: 0 },
            { scrollTrigger: { trigger: el, start: 'top 85%', once: true }, y: 0, opacity: 1, duration: 0.65, ease: 'power3.out' }
          );
        });

        return () => {
          lenis.destroy();
          gsap.ticker.remove(lenisRaf);
          ScrollTrigger.getAll().forEach(t => t.kill());
        };
      }, []);

      return (
        <>
          <Header />
          <main>
            <Hero />
            <ProblemSolution />
            <HowItWorks />
            <Modules />
            <Benefits />
            <TrustSection />
            <FAQ />
            <FinalCTA />
          </main>
          <Footer />
          <QiusTweaks />
        </>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
